title: "English Students' Society"
description: >-
  The English Students' Society website is the hub for all things ESS related.
  Find out about club updates, news, and events, and take advantage of our
  collection of resources to help you get the most out of your English degree.

# ── Update these before deploying ──────────────────────────────
url:     "https://YOUR-USERNAME.github.io"   # e.g. https://essclub.github.io
baseurl: ""                                   # set to /repo-name if not on custom domain
# ───────────────────────────────────────────────────────────────

email: ess.club@uleth.ca

# Social links (used in footer & contact page)
social:
  instagram: https://www.instagram.com/ulethess/
  linkedin:  http://linkedin.com/groups/14498338
  twitter:   https://twitter.com/essuleth
  facebook:  https://www.facebook.com/share/g/1Q1zWMa3ff/

# Build settings
markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Blog posts
permalink: /updates/:year/:month/:day/:title/

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
  - node_modules/
