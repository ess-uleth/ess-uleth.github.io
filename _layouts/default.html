<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}" type="image/png">
</head>
<body>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include land-acknowledgement.html %}
  {% include footer.html %}

  <script>
    // Mobile nav toggle
    const toggle = document.querySelector('.site-nav__toggle');
    const links  = document.querySelector('.site-nav__links');
    if (toggle) {
      toggle.addEventListener('click', () => {
        links.classList.toggle('is-open');
      });
    }

    // Active nav link highlight
    const currentPath = window.location.pathname;
    document.querySelectorAll('.site-nav__links a').forEach(link => {
      if (link.getAttribute('href') === currentPath ||
          (currentPath !== '/' && currentPath.startsWith(link.getAttribute('href'))) ) {
        link.classList.add('active');
      }
    });
  </script>

</body>
</html>
