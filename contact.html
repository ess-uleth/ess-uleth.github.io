---
layout: default
title: Contact
description: Get in touch with the English Students' Society.
---

<section class="section">
  <div class="container">
    <div class="section-header" style="max-width:560px;margin:0 auto var(--space-md);">
      <p class="section-label">Reach Out</p>
      <h1>Connect with Us</h1>
      <p>Have a question, want to get involved, or have an opportunity to share? We'd love to hear from you.</p>
    </div>

    <!-- Option 1: Use a Formspree or similar free form service.
         Replace YOUR_FORM_ID with your Formspree endpoint. -->
    <div class="contact-form">
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's this about?">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn--primary">Send Message</button>
      </form>

      <hr style="border:none;border-top:1px solid var(--color-border);margin:2.5rem 0;">

      <div style="display:flex;flex-direction:column;gap:0.5rem;">
        <p class="section-label">Find us online</p>
        <p>
          <a href="https://www.instagram.com/ulethess/" target="_blank" rel="noopener">Instagram</a> ·
          <a href="http://linkedin.com/groups/14498338" target="_blank" rel="noopener">LinkedIn</a> ·
          <a href="https://twitter.com/essuleth" target="_blank" rel="noopener">X / Twitter</a> ·
          <a href="https://www.facebook.com/share/g/1Q1zWMa3ff/" target="_blank" rel="noopener">Facebook</a>
        </p>
      </div>
    </div>
  </div>
</section>
